<script>
(async () => {
  const $list = document.querySelector('#gallery-list');

  // NEW: convert common Google Drive share links to direct-view URLs
  function toDirect(url) {
    if (!url) return url;
    // /file/d/<ID>/view?...  ->  uc?export=view&id=<ID>
    let m = url.match(/https?:\/\/drive\.google\.com\/file\/d\/([^/]+)\/view/i);
    if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;

    // open?id=<ID>
    m = url.match(/https?:\/\/drive\.google\.com\/open\?id=([^&]+)/i);
    if (m) return `https://drive.google.com/uc?export=view&id=${m[1]}`;

    // already direct
    m = url.match(/https?:\/\/drive\.google\.com\/uc\?[^#]*\bid=([^&]+)/i);
    if (m) return url;

    return url; // non-Drive links unchanged
  }

  function card(item) {
    const imgSrc = toDirect(item.image);
    return `
      <div class="card">
        <div class="thumb">
          <img loading="lazy" src="${imgSrc || ''}" alt="${item.species || item.title || 'orchid'}" />
        </div>
        <div class="meta">
          <strong>${item.species || item.title || 'Orchid'}</strong>
          <div class="sub">${item.description || ''}</div>
        </div>
      </div>`;
  }

  try {
    const res = await fetch('/assets/data/gallery.json?bust=' + Date.now());
    const data = await res.json();
    $list.innerHTML = (Array.isArray(data) ? data : []).map(card).join('') || '<em>No items.</em>';
  } catch (e) {
    console.error(e);
    $list.innerHTML = '<em>Could not load gallery.</em>';
  }
})();
</script>
