<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Orchid Continuum – Vision Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:system-ui,Arial; max-width:860px; margin:24px auto; padding:0 12px}
    .row{display:flex; gap:8px; flex-wrap:wrap}
    input,button{padding:10px; border-radius:10px; border:1px solid #ccc}
    button{background:#5c6cff; color:#fff; border:0; cursor:pointer}
    pre{background:#f6f8fa; padding:12px; border-radius:10px; overflow:auto}
    img{max-width:320px; border-radius:12px; border:1px solid #eee}
  </style>
</head>
<body>
  <h1>Vision Metadata Test</h1>
  <div class="row">
    <input id="u" style="flex:1" placeholder="Paste image URL (https://...)" />
    <button id="go">Analyze</button>
  </div>
  <div style="margin-top:12px" class="row">
    <img id="preview" alt="" />
  </div>
  <h2>Result</h2>
  <pre id="out">—</pre>

  <script>
    const ENDPOINT = "/functions/oc-vision";
    const u = document.getElementById("u");
    const out = document.getElementById("out");
    const img = document.getElementById("preview");
    document.getElementById("go").onclick = async () => {
      const url = (u.value || "").trim();
      if (!url) { out.textContent = "Enter an image URL."; return; }
      img.src = url;
      out.textContent = "Analyzing…";
      try {
        const res = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "content-type":"application/json" },
          body: JSON.stringify({ image_url: url })
        });
        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        out.textContent = "Error: " + (e?.message || e);
      }
    };
  </script>
</body>
</html>
