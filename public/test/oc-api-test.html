<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>API Test</title>
</head>
<body>
  <button onclick="ping()">Ping API</button>
  <pre id="out"></pre>

  <script>
  async function ping() {
    const res = await fetch('/oc-api', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ action: 'echo', payload: { hello: 'orchids' } })
    });
    const data = await res.json();
    document.getElementById('out').textContent = JSON.stringify(data, null, 2);
  }
  </script>
</body>
</html>
