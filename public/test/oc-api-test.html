<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>OC API Test</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 2rem; }
    button { padding:.6rem 1rem; border-radius:.5rem; border:1px solid #ccc; cursor:pointer; }
    #out { margin-top:1rem; padding:1rem; border:1px solid #eee; border-radius:.5rem; white-space:pre-wrap; }
    textarea { width:100%; max-width:700px; padding:.6rem; border-radius:.5rem; border:1px solid #ccc; }
    label { display:block; margin-top:1rem; font-weight:600; }
  </style>
</head>
<body>
  <h1>OC API Test</h1>

  <label for="p">Prompt</label>
  <textarea id="p" rows="3">Give me a short fun fact about orchids.</textarea>

  <div style="margin-top:1rem;">
    <button id="go">Ask</button>
  </div>

  <div id="out" aria-live="polite"></div>

  <script>
    const endpoint = "/functions/oc-api"; // <<< Cloudflare Pages Functions path

    const out = document.getElementById("out");
    const go  = document.getElementById("go");
    const p   = document.getElementById("p");

    go.addEventListener("click", async () => {
      out.textContent = "Thinking…";
      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ action:"chat", payload:{ prompt: p.value } })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok) throw new Error(data.error || res.statusText);
        out.textContent = data.reply || "(no reply)";
      } catch (e) {
        out.textContent = "Error: " + (e?.message || e);
      }
    });
  </script>
</body>
</html>
