<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orchid Continuum API Test</title>
</head>
<body>
  <h2>🌸 Orchid Continuum API Test</h2>
  <form id="apiForm">
    <label for="prompt">Enter a prompt:</label><br>
    <textarea id="prompt" rows="4" cols="50"></textarea><br><br>
    <button type="submit">Send to API</button>
  </form>

  <h3>Response:</h3>
  <pre id="response"></pre>

  <script>
    document.getElementById('apiForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const prompt = document.getElementById('prompt').value;

      const res = await fetch('/.netlify/functions/oc-api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      document.getElementById('response').textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
