<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orchid Fun Fact</title>
  <style>
    :root{
      --bg:#0e1116; --panel:#161a22; --ink:#e9eef7; --muted:#a9b2c7; --accent:#63e; --accent2:#8af;
      --radius:14px; --gap:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    html,body{background:var(--bg); color:var(--ink); font-family:var(--font); margin:0; padding:0;}
    .wrap{max-width:760px; margin:40px auto; padding:20px;}
    .card{
      background:var(--panel); border:1px solid #23293a; border-radius:var(--radius);
      box-shadow:var(--shadow); padding:24px;
    }
    h1{font-size:clamp(22px, 2.5vw, 28px); margin:0 0 6px;}
    p.sub{color:var(--muted); margin:0 0 18px;}
    .row{display:flex; gap:var(--gap); flex-wrap:wrap; align-items:center;}
    button{
      appearance:none; border:0; border-radius:12px; padding:12px 16px; cursor:pointer;
      background:linear-gradient(135deg, var(--accent), var(--accent2)); color:white; font-weight:600;
    }
    button[disabled]{opacity:.6; cursor:progress;}
    .out{
      border:1px solid #2a3144; background:#0c0f15; border-radius:12px; padding:16px; min-height:72px;
      margin-top:16px; line-height:1.45; white-space:pre-wrap;
    }
    .muted{color:var(--muted)}
    .spinner {
      display:inline-block; width:16px; height:16px; border:2px solid #fff2;
      border-top-color:#fff; border-radius:50%; animation:spin .9s linear infinite; vertical-align:-3px; margin-right:8px;
    }
    @keyframes spin { to { transform:rotate(360deg) } }
    footer{margin-top:18px; color:var(--muted); font-size:12px}
    a{color:#9db8ff; text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Orchid Fun Fact</h1>
      <p class="sub">Click the button and I’ll fetch a short, delightful orchid fact.</p>

      <div class="row">
        <button id="goBtn">
          <span id="goTxt">Give me a fun fact</span>
        </button>
        <span class="muted">(~1–2 sentences)</span>
      </div>

      <div id="out" class="out" aria-live="polite">Ready.</div>

      <footer>
        Endpoint: <code id="epLabel"></code>
      </footer>
    </div>
  </div>

  <script>
    // If this file is on the SAME site as your function (Cloudflare Pages),
    // leave this as a relative path:
    const ENDPOINT = "/functions/oc-api";
    // If you embed this on another domain, replace with the full URL:
    // const ENDPOINT = "https://orchid-continuum.pages.dev/functions/oc-api";

    document.getElementById("epLabel").textContent = ENDPOINT;

    const btn  = document.getElementById("goBtn");
    const txt  = document.getElementById("goTxt");
    const out  = document.getElementById("out");

    async function fetchFunFact(){
      try{
        btn.disabled = true;
        txt.innerHTML = '<span class="spinner"></span>Thinking…';
        out.textContent = "Fetching a fresh orchid fact…";

        // We’ll use the existing "chat" action in your function and give it a targeted prompt.
        const payload = {
          action: "chat",
          prompt: "Give a single fun fact about orchids for the general public. Keep it under 60 words. No preamble, just the fact."
        };

        const res = await fetch(ENDPOINT, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });

        if(!res.ok){
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        if (data && data.ok && typeof data.reply === "string") {
          out.textContent = data.reply.trim();
        } else {
          // Fallback in case the function returns an unexpected shape
          out.textContent = "I couldn’t parse a reply. Here’s the raw response:\n" + JSON.stringify(data, null, 2);
        }
      } catch (err){
        out.textContent = `Error: ${err.message}. Check your function logs and API key.`;
      } finally {
        btn.disabled = false;
        txt.textContent = "Give me a fun fact";
      }
    }

    btn.addEventListener("click", fetchFunFact);
  </script>
</body>
</html>
