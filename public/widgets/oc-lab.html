<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orchid Continuum — Assistant Lab</title>
  <meta name="color-scheme" content="dark light">
  <style>
    :root{
      --bg:#0e1116; --panel:#141925; --ink:#e9eef7; --ink-2:#b6bfd6;
      --line:#26314a; --accent:#7b5cff; --accent-2:#51c0ff;
      --radius:14px; --gap:14px; --shadow:0 12px 28px rgba(0,0,0,.35);
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
    }
    @media (prefers-color-scheme: light){
      :root{ --bg:#f6f8fc; --panel:#ffffff; --ink:#0f1222; --ink-2:#3b4359; --line:#e5e9f1; --shadow:0 8px 24px rgba(16,24,40,.08); }
    }
    *{box-sizing:border-box}
    body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font);}
    .brandbar{background:linear-gradient(120deg, var(--accent), var(--accent-2)); color:white; padding:22px 18px;}
    .brandwrap{max-width:980px; margin:0 auto; display:flex; align-items:center; gap:16px}
    .logo{width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,.18); display:grid; place-items:center; font-weight:900;}
    .title{font-size:22px; font-weight:800; margin:0}
    .wrap{max-width:980px; margin:28px auto; padding:0 18px 40px}
    .tabs{display:flex; gap:8px; flex-wrap:wrap; margin:0 0 14px}
    .tab{border:1px solid var(--line); background:var(--panel); border-radius:999px; padding:8px 14px; cursor:pointer; font-weight:600;}
    .tab.active{background:linear-gradient(120deg, #2a3550, #202a44); color:#fff}
    .grid{display:grid; grid-template-columns:1fr; gap:16px}
    @media (min-width:860px){ .grid{grid-template-columns: 1fr 1fr} }
    .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px;}
    h2{font-size:18px; margin:0 0 8px}
    p.sub{color:var(--ink-2); margin:0 0 14px}
    input, textarea, select{width:100%; border:1px solid var(--line); background:transparent; color:inherit; padding:10px 12px; border-radius:10px;}
    textarea{min-height:110px; resize:vertical}
    button{border:0; border-radius:12px; padding:10px 14px; cursor:pointer; font-weight:700; color:white; background:linear-gradient(135deg, var(--accent), var(--accent-2));}
    button[disabled]{opacity:.6; cursor:progress}
    .out{border:1px dashed var(--line); border-radius:12px; padding:14px; min-height:88px; white-space:pre-wrap; line-height:1.5; background:rgba(0,0,0,.1); margin-top:12px;}
    .hide{display:none}
    .spinner{display:inline-block; width:16px; height:16px; border:2px solid #fff3; border-top-color:#fff; border-radius:50%; animation:spin .9s linear infinite; margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <header class="brandbar">
    <div class="brandwrap">
      <div class="logo">OC</div>
      <div>
        <h1 class="title">Orchid Continuum — Assistant Lab</h1>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="tabs">
      <button class="tab active" data-panel="facts">Fun Facts</button>
      <button class="tab" data-panel="care">Care Tips</button>
      <button class="tab" data-panel="pests">Pest Troubleshooter</button>
    </div>

    <!-- FUN FACTS -->
    <section id="panel-facts" class="grid">
      <div class="card">
        <h2>Instant Fun Fact</h2>
        <button id="btnFact"><span id="txtFact">Give me a fun fact</span></button>
        <div id="outFact" class="out">Ready.</div>
      </div>
    </section>

    <!-- CARE TIPS -->
    <section id="panel-care" class="grid hide">
      <div class="card">
        <h2>Care Tips</h2>
        <input id="carePlant" type="text" placeholder="Enter orchid type"/>
        <button id="btnCare"><span id="txtCare">Get care tips</span></button>
        <div id="outCare" class="out"></div>
      </div>
    </section>

    <!-- PESTS -->
    <section id="panel-pests" class="grid hide">
      <div class="card">
        <h2>Pest & Problem Troubleshooter</h2>
        <textarea id="symptoms" placeholder="Describe symptoms..."></textarea>
        <button id="btnPests"><span id="txtPests">Analyze</span></button>
        <div id="outPests" class="out"></div>
      </div>
    </section>
  </main>

  <script>
    const ENDPOINT = "/functions/oc-api";
    const tabs = document.querySelectorAll(".tab");
    const panels = {
      facts: document.getElementById("panel-facts"),
      care: document.getElementById("panel-care"),
      pests: document.getElementById("panel-pests"),
    };
    tabs.forEach(t=>{
      t.addEventListener("click", ()=>{
        tabs.forEach(x=>x.classList.remove("active"));
        Object.values(panels).forEach(p=>p.classList.add("hide"));
        t.classList.add("active");
        panels[t.dataset.panel].classList.remove("hide");
      });
    });
    async function ocChat(prompt){
      const res = await fetch(ENDPOINT, {
        method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify({ action:"chat", prompt })
      });
      const data = await res.json();
      return data.reply || "Error.";
    }
    const spin='<span class="spinner"></span>';
    // Fun fact
    btnFact.onclick=async()=>{
      txtFact.innerHTML=spin+"Thinking…"; btnFact.disabled=true;
      outFact.textContent=await ocChat("Give one orchid fun fact under 50 words. No preamble.");
      txtFact.textContent="Give me a fun fact"; btnFact.disabled=false;
    };
    // Care tips
    btnCare.onclick=async()=>{
      txtCare.innerHTML=spin+"Working…"; btnCare.disabled=true;
      outCare.textContent=await ocChat("Provide care tips for "+carePlant.value+" in 5 bullet points. Under 100 words.");
      txtCare.textContent="Get care tips"; btnCare.disabled=false;
    };
    // Pests
    btnPests.onclick=async()=>{
      txtPests.innerHTML=spin+"Analyzing…"; btnPests.disabled=true;
      outPests.textContent=await ocChat("Orchid symptoms: "+symptoms.value+". Give possible issues, how to confirm, and quick remedies.");
      txtPests.textContent="Analyze"; btnPests.disabled=false;
    };
  </script>
</body>
</html>
