<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FCOS API Hub</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; max-width: 960px; margin: 24px auto; padding: 0 12px; }
    h1 { margin-bottom: 0.5rem; }
    fieldset { margin: 16px 0; }
    button { padding: 8px 12px; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto; }
    label { display:block; margin: 6px 0 2px; font-weight: 600; }
    input, textarea { width: 100%; padding: 8px; }
  </style>
</head>
<body>
  <h1>Orchid Continuum – API Hub</h1>
  <p>Click any test to call <code>/oc-api</code>. Results appear at the bottom.</p>

  <fieldset>
    <legend>Echo</legend>
    <button onclick="call('echo', { hello: 'orchids' })">Test Echo</button>
  </fieldset>

  <fieldset>
    <legend>Chat (OpenAI)</legend>
    <label for="chatPrompt">Prompt</label>
    <input id="chatPrompt" value="Give me one fun fact about orchids.">
    <button onclick="call('chat', { prompt: document.getElementById('chatPrompt').value })">Ask</button>
    <small>Requires OPENAI_API_KEY set in Cloudflare → Project → Settings → Variables.</small>
  </fieldset>

  <fieldset>
    <legend>Orchid of the Day</legend>
    <button onclick="call('orchidOfTheDay', {})">Get Orchid of the Day</button>
  </fieldset>

  <fieldset>
    <legend>Search</legend>
    <label for="q">Query</label>
    <input id="q" value="catt">
    <button onclick="call('search', { q: document.getElementById('q').value })">Search</button>
  </fieldset>

  <fieldset>
    <legend>Gallery</legend>
    <button onclick="call('gallery', {})">List Gallery</button>
  </fieldset>

  <fieldset>
    <legend>Climate</legend>
    <label for="loc">Location</label>
    <input id="loc" value="San Luis Obispo">
    <label for="gen">Genus</label>
    <input id="gen" value="Cattleya">
    <button onclick="call('climate', { location: document.getElementById('loc').value, genus: document.getElementById('gen').value })">Compare</button>
  </fieldset>

  <h2>Result</h2>
  <pre id="out">—</pre>

  <script>
    async function call(action, payload) {
      document.getElementById('out').textContent = 'Loading…';
      const res = await fetch('/oc-api', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ action, payload })
      });
      const data = await res.json();
      document.getElementById('out').textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
