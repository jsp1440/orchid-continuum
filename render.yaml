services:
  - type: web
    name: orchid-continuum
    env: python
    plan: free
    region: oregon

    buildCommand: |
      apt-get update && xargs -a apt.txt apt-get install -y
      pip install --upgrade pip 
      pip install -r apps/api/requirements.txt

    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
