services:
  - type: web
    name: orchid-continuum
    env: python
    region: oregon
    plan: free
    buildCommand: |
      apt-get update
      apt-get install -y build-essential libpq-dev libjpeg-dev zlib1g-dev libssl1-dev
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
