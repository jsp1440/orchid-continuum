services:
  - type: web
    name: orchid-continuum
    env: python
    plan: free
    region: oregon

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port 10000

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.4

    build:
      aptPackages:
        - build-essential
        - libpq-dev
        - libjpeg-dev
        - zlib1g-dev
        - libssl-dev
